name = "per-ankh-frontend"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2024-12-01"

# Custom domain: per-ankh.app
# Wrangler attaches the custom domain on deploy. The Pages project named
# `per-ankh` must have already released this hostname (§3.8 + §4 step 5)
# or the attach will fail.
routes = [{ pattern = "per-ankh.app", custom_domain = true }]

# Static assets (client bundle, prerendered pages, atlases, sprites, fonts,
# etc.) are uploaded from the adapter-cloudflare output directory.
# `binding` is required by @sveltejs/adapter-cloudflare 7.x when `main` is
# set — see validate_worker_settings in
# node_modules/@sveltejs/adapter-cloudflare/utils.js.
#
# `not_found_handling` is intentionally unset so unmatched paths fall
# through to the SSR Worker (correct for SvelteKit dynamic routes).
[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

# ─────────────────────────────────────────────────────────────────────────────
# Staging frontend (staging.per-ankh.app).
#
# Wrangler 4 inherits `routes` into named envs — this block MUST declare its
# own routes. If it were removed, `wrangler deploy --env staging` would
# inherit the prod route and attach per-ankh.app to the staging worker.
# main / compatibility_date / [assets] are inherited from the top level.
#
# Build for staging with the staging env vars (the staging deploy command
# does this): VITE_API_URL=https://api-staging.per-ankh.app/v1
#             VITE_PUBLIC_ORIGIN=https://staging.per-ankh.app
# ─────────────────────────────────────────────────────────────────────────────
[env.staging]
routes = [{ pattern = "staging.per-ankh.app", custom_domain = true }]
