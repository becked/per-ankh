name = "per-ankh-share-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
# AsyncLocalStorage from node:async_hooks. Backs the request-scoped log
# context in cloud/src/log.ts so handlers can attach fields to the access
# log without threading a context argument through every signature.
# `nodejs_als` is the lightweight flag — full `nodejs_compat` would pull
# in a large compatibility shim we don't need.
compatibility_flags = ["nodejs_als"]

# Custom domain: api.per-ankh.app
# Wrangler creates the DNS record automatically
routes = [{ pattern = "api.per-ankh.app", custom_domain = true }]

# D1 migrations live in cloud/migrations/ (wrangler's default location),
# applied via:
#   npm run migrate:local    (local sqlite under .wrangler/)
#   npm run migrate:staging  (staging D1)
#   npm run migrate:remote   (production D1)

# R2 blob storage for shared game data
[[r2_buckets]]
binding = "SHARE_BUCKET"
bucket_name = "per-ankh-shares"

# D1 database for share index, cloud users/games, and event logging
[[d1_databases]]
binding = "SHARE_DB"
database_name = "per-ankh-share-index"
database_id = "e57449fd-6c9f-4b16-a013-322f9669182b"
# Explicit (this is the default) now that a second DB has its own dir — keeps
# the two unambiguous: `migrate:*` targets this one, `migrate:security:*` the
# other.
migrations_dir = "migrations"

# D1 database for the Skiff security_events drain (issue #71). Dedicated, NOT
# SHARE_DB, so probe-flood write bursts can't contend with live app queries on
# D1's single-threaded-per-database engine. Drained read-only over the D1 REST
# API; emit chokepoint in src/security-events.ts. Migrations live in
# cloud/migrations-security/, applied out-of-band via `migrate:security:*`
# (deliberately NOT wired into the deploy pipeline — the schema is static).
[[d1_databases]]
binding = "SECURITY_DB"
database_name = "per-ankh-security-events"
database_id = "a1c4b60b-d967-497f-864c-f451364aa9a1"
migrations_dir = "migrations-security"

# KV namespace for OAuth pending state (5min TTL) and sessions (30d TTL).
# Keys are prefixed `oauth:<id>` and `session:<token>` respectively.
# Run once to create:
#   npx wrangler kv namespace create SESSIONS_KV
#   npx wrangler kv namespace create SESSIONS_KV --preview
# Then paste the returned IDs below.
[[kv_namespaces]]
binding = "SESSIONS_KV"
id = "b7029ad65b8f410b84b4b55623b25e56"
preview_id = "e4725d2a3a324ec98580f6d6cae1f209"

# Nightly retention sweep over the D1 `events` table — see the `scheduled`
# handler in src/index.ts and the per-event-type policy in src/retention.ts.
# 03:47 UTC is off-peak for the player base and deliberately off the hour
# boundary.
[triggers]
crons = ["47 3 * * *"]

[vars]
# === Legacy share endpoints ===
# Max compressed payload size (5 MB)
MAX_COMPRESSED_SIZE = "5242880"
# Max decompressed payload size (20 MB) — gzip bomb protection
MAX_DECOMPRESSED_SIZE = "20971520"
# CORS for legacy /v1/share/*: single origin only. The legacy share viewer
# now lives at legacy.per-ankh.app (post-cutover), so its browser fetches
# come from that origin. Desktop v0.2.0 (Tauri) is a native HTTP client
# and doesn't enforce CORS, so it's unaffected by this value. The new
# SSR app on per-ankh.app does not call /v1/share/* at all.
ALLOWED_ORIGIN = "https://legacy.per-ankh.app"
# Rate limit: max uploads per app key per hour
RATE_LIMIT_PER_HOUR = "10"
# Rate limit: max downloads per IP per hour (via Cache API)
DOWNLOAD_RATE_LIMIT_PER_HOUR = "200"
# Rate limit: max uploads per IP per hour (catches key rotation)
IP_RATE_LIMIT_PER_HOUR = "20"
# Global circuit breaker: max total uploads per hour across all users
GLOBAL_UPLOAD_LIMIT_PER_HOUR = "200"
# Kill switch: set to "false" via `wrangler secret put` to disable uploads without redeploying
UPLOADS_ENABLED = "true"

# === Cloud rewrite upload limits ===
# Apply to uploads + reimports together (same R2/D1 work). Set generous —
# reimports are forced by parser-version bumps (BulkReparseModal), so
# anything tight breaks legitimate workflows. Tighten reactively if abuse
# signal appears.
PER_USER_UPLOADS_PER_HOUR = "100"
# 2x PER_USER gives real headroom for shared IPs (households, offices, NAT)
# while still catching single-IP abuse rotating across accounts.
PER_IP_UPLOADS_PER_HOUR = "200"
# Global circuit breaker. Saturates around 50 concurrently-active users —
# a real "something is wrong" threshold, not a normal-growth ceiling.
GLOBAL_UPLOADS_PER_HOUR = "5000"

# === Cloud rewrite (/v1/auth/*, /v1/games/*) ===
# CORS allowlist for new routes — comma-separated origins. Cookie-based
# auth requires Access-Control-Allow-Credentials: true, which forbids the
# wildcard origin, so we echo the request Origin if it's in this list.
ALLOWED_ORIGINS = "https://per-ankh.app,http://localhost:1420"
# Discord OAuth client ID. Public per spec §5; kept here for parity with secret.
# Replace with the value from https://discord.com/developers/applications.
DISCORD_CLIENT_ID = "1500901451034263604"
# DISCORD_CLIENT_SECRET is set out-of-band:
#   npx wrangler secret put DISCORD_CLIENT_SECRET
# Session cookie name. A var (not a code const) so staging can use a distinct
# name: both environments set Domain=per-ankh.app on the session cookie (the
# only shared ancestor of their sibling subdomains), so a staging cookie named
# "session" would clobber the prod session in the same browser. The Miniflare
# test harness loads this top-level [vars] block, and the integration tests
# hardcode `session=` — keep this value "session".
SESSION_COOKIE_NAME = "session"

# ─────────────────────────────────────────────────────────────────────────────
# Staging environment (api-staging.per-ankh.app).
#
# Wrangler 4 inheritance rules (verified against wrangler's config source):
#   - vars, d1_databases, kv_namespaces, r2_buckets are NOT inherited — every
#     binding and var below is a deliberate full duplicate of the top level.
#     The `secrets.parity` preflight check enforces that the key sets match.
#   - routes IS inherited — this block MUST declare its own routes. If it were
#     removed, `wrangler deploy --env staging` would inherit the prod route and
#     attach api.per-ankh.app to the staging worker.
#   - triggers IS inherited — the empty [env.staging.triggers] below opts
#     staging out of the nightly retention cron. Staging D1 is recloned from
#     prod; an independent sweep there would skew prod/staging diffs.
#   - main / compatibility_date / compatibility_flags are inherited; not
#     repeated here.
#
# Secrets are per-environment: DISCORD_CLIENT_SECRET (and optionally
# ADMIN_DISCORD_ID) must be set with `wrangler secret put <NAME> --env staging`.
# ─────────────────────────────────────────────────────────────────────────────
[env.staging]
routes = [{ pattern = "api-staging.per-ankh.app", custom_domain = true }]

# Opt out of the inherited nightly retention cron (see top-level comment).
[env.staging.triggers]
crons = []

[[env.staging.r2_buckets]]
binding = "SHARE_BUCKET"
bucket_name = "per-ankh-shares-staging"

[[env.staging.d1_databases]]
binding = "SHARE_DB"
database_name = "per-ankh-share-index-staging"
# Paste from `wrangler d1 create per-ankh-share-index-staging`:
database_id = "74cb5f03-fe51-4770-81dc-da7ac600b911"
migrations_dir = "migrations"

# Staging security_events DB (see top-level SECURITY_DB comment). Binding name
# must match prod — the secrets.parity preflight enforces it. Staging is opted
# out of the nightly cron, so this DB won't auto-prune (fine: low volume,
# disposable, recloned).
[[env.staging.d1_databases]]
binding = "SECURITY_DB"
database_name = "per-ankh-security-events-staging"
database_id = "ee9c92dc-0f4f-4fbe-a033-5f87c58d37f5"
migrations_dir = "migrations-security"

[[env.staging.kv_namespaces]]
binding = "SESSIONS_KV"
# Paste from `wrangler kv namespace create SESSIONS_KV --env staging` (+ --preview):
id = "1db613e81532484189d37ad410584264"
preview_id = "be620b722e444391bc73cfed9b2863c8"

[env.staging.vars]
# Every top-level [vars] key is duplicated here (wrangler does not inherit
# vars; secrets.parity enforces the key sets match). Values differ only where
# the environment differs.
MAX_COMPRESSED_SIZE = "5242880"
MAX_DECOMPRESSED_SIZE = "20971520"
# Legacy share viewer has no staging deployment; the staging frontend origin
# is the sanest value for the legacy single-origin CORS var.
ALLOWED_ORIGIN = "https://staging.per-ankh.app"
RATE_LIMIT_PER_HOUR = "10"
DOWNLOAD_RATE_LIMIT_PER_HOUR = "200"
IP_RATE_LIMIT_PER_HOUR = "20"
GLOBAL_UPLOAD_LIMIT_PER_HOUR = "200"
UPLOADS_ENABLED = "true"
PER_USER_UPLOADS_PER_HOUR = "100"
PER_IP_UPLOADS_PER_HOUR = "200"
GLOBAL_UPLOADS_PER_HOUR = "5000"
ALLOWED_ORIGINS = "https://staging.per-ankh.app"
# Separate staging Discord OAuth app — paste its client ID:
DISCORD_CLIENT_ID = "1512545079493922927"
# Distinct cookie name so staging logins can't clobber the prod session
# (both envs share Domain=per-ankh.app — see the top-level comment).
SESSION_COOKIE_NAME = "session_staging"
